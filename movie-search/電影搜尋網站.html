<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電影搜尋網站</title>
    <link rel="stylesheet" href="movie.css">
</head>
<body>
    <h1>電影搜尋網站</h1>
    <nav>
        <button id="hamburger">☰</button>
        <div id="nav-links">
            <span id="nav-search" class="active">搜尋</span>
            <span id="nav-favorite">收藏</span>
        </div>
    </nav>
    <div id="detail"></div>
    <div id="search-page">
        <div class="search-area">
            <div id="input-wrapper">
                <input id="keyword" type="text" placeholder="請輸入電影名稱"></input>
                <div id="searchHistoryList"></div>
            </div>
            <select id="type-filter">
                <option value="">全部</option>
                <option value="movie">電影</option>
                <option value="series">影集</option>
            </select>
            <button id="search">搜尋</button>
        </div>
        <p id="loading"></p>
        <p id="total"></p>
        <p id="empty"></p>
        <div id="result" class="movie-grid"></div>
        <div id="pagination">
            <button id="prev">上一頁</button>
            <span id="pageNum">1</span>
            <button id="next">下一頁</button>
        </div>
    </div>
    <div id="favorite-page">
        <h2>我的收藏</h2>
        <p id="no-favorite">目前沒有收藏的電影</p>
        <div id="favorite-list" class="movie-grid"></div>
    </div>
    <script type="module" src="movie.js"></script>
</body>
</html>
