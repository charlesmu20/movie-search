<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電影搜尋網站</title>
    <link rel="stylesheet" href="movie.css">
</head>
<body>
    <h1>電影搜尋網站</h1>
    <div class="search-area">
        <input id="keyword" type="text" placeholder="請輸入電影名稱"></input>
        <button id="search">搜尋</button>
    </div>
    <p id="loading"></p>
    <p id="empty"></p>
    <p id="total"></p>
    <div id="result"></div>
    <div id="detail"></div>
    <div id="pagination">
        <button id="prev">上一頁</button>
        <span id="pageNum">1</span>
        <button id="next">下一頁</button>
    </div>
    <script type="module" src="movie.js"></script>
</body>
</html>
